<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORYZAE / Image Board</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23faf9f4'/%3E%3Ccircle cx='21' cy='25' r='7' fill='%233d9a92'/%3E%3Ccircle cx='43' cy='20' r='7' fill='%23d9bc68'/%3E%3Ccircle cx='38' cy='43' r='7' fill='%23bd453c'/%3E%3Cpath d='M21 25 43 20 38 43 21 25' fill='none' stroke='%23202939' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
    <script>
      (function() {
        var t = localStorage.getItem("oryzae-theme");
        if (t === "dark" || t === "light") {
          document.documentElement.setAttribute("data-theme", t);
        }
        var l = localStorage.getItem("oryzae-lang");
        if (l === "zh" || l === "en") {
          document.documentElement.setAttribute("lang", l === "zh" ? "zh-CN" : "en");
        }
      })();
    </script>
    <link rel="stylesheet" href="/styles.css?v=12" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sideNav" class="rail" aria-label="主导航">
        <button id="navToggle" class="nav-toggle" type="button" aria-label="折叠导航" aria-expanded="true">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-brand">
          <span class="nav-kicker">ORYZAE</span>
          <strong>创作平台</strong>
        </div>
        <nav class="nav-links" aria-label="页面导航">
          <a class="nav-link active" href="/" title="工作界面">
            <span class="nav-icon">W</span>
            <span class="nav-label">工作界面</span>
          </a>
          <a class="nav-link" href="/history/" title="历史浏览器">
            <span class="nav-icon">H</span>
            <span class="nav-label">历史浏览器</span>
          </a>
          <a class="nav-link" href="/home.html" title="主页">
            <span class="nav-icon">P</span>
            <span class="nav-label">主页</span>
          </a>
          <button id="historyToggle" class="nav-link" title="历史会话">
            <span class="nav-icon">S</span>
            <span class="nav-label">历史会话</span>
          </button>
        </nav>
        <div class="nav-settings">
          <div class="nav-settings-label">设置</div>
          <div class="nav-settings-grid">
            <button id="exportBtn" class="nav-setting-btn" title="导出会话" aria-label="导出会话">📤</button>
            <button id="importBtn" class="nav-setting-btn" title="导入会话" aria-label="导入会话">📥</button>
            <button id="saveButton" class="nav-setting-btn" title="保存会话" aria-label="保存会话">💾</button>
            <button id="fitButton" class="nav-setting-btn" title="重置视图" aria-label="重置视图">⌖</button>
            <button id="zoomOutButton" class="nav-setting-btn" title="缩小" aria-label="缩小">−</button>
            <button id="zoomInButton" class="nav-setting-btn" title="放大" aria-label="放大">+</button>
            <button id="arrangeButton" class="nav-setting-btn" title="一键整理" aria-label="一键整理">🧹</button>
            <button id="settingsBtn" class="nav-setting-btn" title="API 设置" aria-label="API 设置">⚙️</button>
          </div>
          <div class="nav-settings-meta">
            <span id="modeBadge" class="mode-badge">checking</span>
            <span id="saveStatus" class="save-status"></span>
          </div>
          <div class="settings-section" style="margin-top:12px;">
            <label class="settings-toggle-row">
              <span>深色模式</span>
              <input id="themeToggle" type="checkbox" />
            </label>
            <div class="settings-language-row" style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;">
              <span>语言</span>
              <select id="languageSelect" style="font:inherit;padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.16);background:rgba(255,255,255,0.08);color:inherit;">
                <option value="zh">中文</option>
                <option value="en">English</option>
              </select>
            </div>
          </div>
        </div>
      </aside>

      <main id="viewport" class="viewport">
        <div id="board" class="board">
          <svg id="linkLayer" class="link-layer" viewBox="0 0 2400 1500" aria-hidden="true"></svg>

          <section id="sourceNode" class="node source-node" data-node-id="source" style="left: 96px; top: 88px;">
            <div class="source-tabs">
              <button type="button" class="source-tab active" data-tab="file">文件</button>
              <button type="button" class="source-tab" data-tab="url">链接</button>
            </div>
            <label class="upload-target" for="fileInput">
              <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp,image/gif,.txt,.md,.json,.docx,.pdf,.pptx" />
              <span id="emptyState" class="empty-state">
                <strong>上传图片或文档</strong>
                <span>选择图片、Word、PDF、PPT 或 TXT，生成分支方向</span>
              </span>
              <img id="sourcePreview" class="source-preview" alt="上传的源图" />
            </label>
            <div class="url-input-panel hidden">
              <input id="urlInput" type="url" placeholder="https://..." autocomplete="off" />
              <button id="urlAnalyzeButton" class="primary-button" disabled>分析链接</button>
            </div>
            <div class="node-caption">
              <span id="sourceName">Source image</span>
              <button id="analyzeButton" class="primary-button" disabled>分析</button>
            </div>
          </section>

          <section id="analysisNode" class="node analysis-node hidden" data-node-id="analysis" style="left: 452px; top: 96px;">
            <p class="eyebrow">MODEL READ</p>
            <h2>图像理解</h2>
            <p id="analysisSummary"></p>
            <div id="keywordList" class="keyword-list"></div>
          </section>
        </div>
      </main>

      <aside id="sessionPanel" class="session-panel hidden" aria-label="历史会话">
        <div class="session-panel-header">
          <span>历史会话</span>
          <button id="closeSessionPanel" class="icon-button" aria-label="关闭">×</button>
        </div>
        <div id="sessionList" class="session-list"></div>
      </aside>

      <footer class="statusbar">
        <form id="chatForm" class="chatbar">
          <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
          <div class="chat-input-row">
            <button id="chatAttachButton" class="chat-attach-button" type="button" title="上传图片或文本文件">+</button>
            <input id="chatInput" class="chat-input" type="text" autocomplete="off" placeholder="输入想继续探索的方向、风格或约束" />
            <button id="chatSendButton" class="chat-send-button" type="submit">发送</button>
          </div>
          <div class="status-cluster">
            <div class="status-readout"><span class="status-dot"></span><span id="statusText">Ready</span></div>
            <div id="counts">方向 0 / 成图 0</div>
          </div>
        </form>
      </footer>
    </div>

    <template id="optionTemplate">
      <section class="node option-node" data-node-id="">
        <p class="eyebrow option-tone"></p>
        <h3 class="option-title"></h3>
        <p class="option-description"></p>
        <button class="generate-button">生成这张图</button>
      </section>
    </template>

    <aside id="settingsPanel" class="settings-panel hidden" aria-label="API 设置">
      <div class="settings-panel-header">
        <span>API 设置</span>
        <button id="closeSettingsPanel" class="icon-button" aria-label="关闭">×</button>
      </div>
      <div class="settings-tabs">
        <button type="button" class="settings-tab active" data-role="analysis">分析</button>
        <button type="button" class="settings-tab" data-role="chat">对话</button>
        <button type="button" class="settings-tab" data-role="image">成图</button>
      </div>
      <form id="settingsForm" class="settings-form" autocomplete="off">
        <label>
          <span>API Endpoint</span>
          <input id="settingsEndpoint" type="url" placeholder="https://api.example.com/v1" required />
        </label>
        <label>
          <span>Model</span>
          <input id="settingsModel" type="text" placeholder="model-name" required />
        </label>
        <label>
          <span>API Key</span>
          <input id="settingsApiKey" type="password" placeholder="sk-..." />
        </label>
        <label>
          <span>Temperature</span>
          <input id="settingsTemperature" type="number" min="0" max="2" step="0.1" value="0.7" required />
        </label>
        <div class="settings-actions">
          <button type="submit" class="primary-button">保存</button>
          <button type="button" id="settingsResetBtn" class="secondary-button">重置</button>
        </div>
      </form>
    </aside>

    <aside id="imageViewerModal" class="image-viewer-modal hidden" aria-label="图片查看器" role="dialog" aria-modal="true">
      <div class="image-viewer-backdrop" data-close-modal></div>
      <div class="image-viewer-content">
        <button id="closeImageViewer" class="image-viewer-close" aria-label="关闭">×</button>
        <img id="viewerImage" class="viewer-image" src="" alt="" />
        <div class="viewer-meta">
          <h3 id="viewerTitle"></h3>
          <p id="viewerExplanation"></p>
          <div class="viewer-actions">
            <button id="viewerRegenerate" class="primary-button">重生成</button>
            <button id="viewerModify" class="secondary-button">修改</button>
            <button id="viewerDownload" class="secondary-button">下载</button>
          </div>
          <div id="viewerModifyPanel" class="viewer-modify-panel hidden">
            <textarea id="viewerPromptInput" rows="3" placeholder="输入自定义提示词..."></textarea>
            <div class="viewer-modify-actions">
              <button id="viewerSubmitModify" class="primary-button">确认修改</button>
              <button id="viewerCancelModify" class="secondary-button">取消</button>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <div id="selectionToast" class="selection-toast" role="status" aria-live="polite"></div>

    <script type="module" src="/app.js?v=6"></script>
  </body>
</html>
