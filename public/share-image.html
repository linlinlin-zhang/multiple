<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORYZAE / Shared Image</title>
    <meta name="description" content="View shared ORYZAE generated image" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23000000'/%3E%3Ccircle cx='32' cy='32' r='18' fill='%230070cc'/%3E%3Cpath d='M22 32h20M32 22v20' stroke='%23ffffff' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/share-image.css" />
  </head>
  <body>
    <div class="share-image-page">
      <header class="share-header">
        <a href="/" class="back-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          <span data-i18n="back">返回应用</span>
        </a>
        <h1 class="share-title" data-i18n="title">分享图片</h1>
      </header>

      <main class="share-content">
        <div id="loading" class="share-loading">
          <div class="spinner"></div>
          <p data-i18n="loading">加载中...</p>
        </div>

        <div id="error" class="share-error hidden">
          <p data-i18n="notFound">分享链接无效或已过期</p>
          <a href="/" class="btn-primary" data-i18n="back">返回应用</a>
        </div>

        <div id="content" class="share-body hidden">
          <section class="image-section">
            <img id="shareImage" src="" alt="Shared generated image" />
          </section>

          <section class="info-section">
            <div class="info-block" id="explanationBlock">
              <h2 data-i18n="explanation">AI 讲解</h2>
              <p id="explanationText"></p>
            </div>

            <div class="info-block" id="sourceBlock">
              <h2 data-i18n="sourceSummary">来源摘要</h2>
              <p id="sourceSummaryText"></p>
              <div class="tag-list" id="subjectTags"></div>
              <div class="tag-list" id="moodTags"></div>
            </div>

            <div class="info-block" id="directionBlock">
              <h2 data-i18n="direction">生成方向</h2>
              <h3 id="directionTitle"></h3>
              <p id="directionDescription"></p>
              <div class="meta-row">
                <span class="meta-badge" id="directionTone"></span>
                <span class="meta-badge" id="directionLayout"></span>
              </div>
            </div>
          </section>
        </div>
      </main>

      <footer class="share-footer">
        <span>ORYZAE Image Board</span>
      </footer>
    </div>

    <script>
      const i18n = {
        zh: {
          back: "返回应用",
          title: "分享图片",
          loading: "加载中...",
          notFound: "分享链接无效或已过期",
          explanation: "AI 讲解",
          sourceSummary: "来源摘要",
          direction: "生成方向",
          noExplanation: "暂无讲解",
          noSummary: "暂无摘要",
          noDirection: "暂无方向信息"
        },
        en: {
          back: "Back to App",
          title: "Shared Image",
          loading: "Loading...",
          notFound: "Share link is invalid or expired",
          explanation: "AI Explanation",
          sourceSummary: "Source Summary",
          direction: "Generation Direction",
          noExplanation: "No explanation available",
          noSummary: "No summary available",
          noDirection: "No direction info available"
        }
      };

      const lang = navigator.language.startsWith("zh") ? "zh" : "en";
      document.documentElement.setAttribute("lang", lang === "zh" ? "zh-CN" : "en");

      function t(key) {
        return i18n[lang][key] || i18n.zh[key] || key;
      }

      function applyI18n() {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (key) el.textContent = t(key);
        });
      }

      applyI18n();

      async function loadShare() {
        const pathParts = window.location.pathname.split("/");
        const token = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];

        if (!token || token === "share-image") {
          showError();
          return;
        }

        try {
          const res = await fetch(`/api/share-image/${token}`);
          if (!res.ok) {
            showError();
            return;
          }
          const data = await res.json();
          if (!data.ok) {
            showError();
            return;
          }
          render(data);
        } catch (err) {
          console.error("[share-image] load failed:", err);
          showError();
        }
      }

      function showError() {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("error").classList.remove("hidden");
        document.getElementById("content").classList.add("hidden");
      }

      function render(data) {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("content").classList.remove("hidden");

        const img = document.getElementById("shareImage");
        if (data.imageHash) {
          img.src = `/api/assets/${data.imageHash}?kind=generated`;
        } else if (data.imageDataUrl) {
          img.src = data.imageDataUrl;
        } else {
          img.alt = t("notFound");
        }

        const explanation = data.explanation || t("noExplanation");
        document.getElementById("explanationText").textContent = explanation;
        if (!data.explanation) {
          document.getElementById("explanationBlock").classList.add("empty");
        }

        const analysis = data.analysis || {};
        const summary = analysis.summary || t("noSummary");
        document.getElementById("sourceSummaryText").textContent = summary;
        if (!analysis.summary) {
          document.getElementById("sourceBlock").classList.add("empty");
        }

        const subjectTags = document.getElementById("subjectTags");
        if (Array.isArray(analysis.detectedSubjects) && analysis.detectedSubjects.length) {
          for (const subject of analysis.detectedSubjects) {
            const span = document.createElement("span");
            span.className = "tag tag-subject";
            span.textContent = subject;
            subjectTags.appendChild(span);
          }
        }

        const moodTags = document.getElementById("moodTags");
        if (Array.isArray(analysis.moodKeywords) && analysis.moodKeywords.length) {
          for (const mood of analysis.moodKeywords) {
            const span = document.createElement("span");
            span.className = "tag tag-mood";
            span.textContent = mood;
            moodTags.appendChild(span);
          }
        }

        const option = data.option || {};
        document.getElementById("directionTitle").textContent = option.title || t("noDirection");
        document.getElementById("directionDescription").textContent = option.description || "";

        const toneEl = document.getElementById("directionTone");
        if (option.tone) {
          toneEl.textContent = option.tone;
        } else {
          toneEl.style.display = "none";
        }

        const layoutEl = document.getElementById("directionLayout");
        if (option.layoutHint) {
          layoutEl.textContent = option.layoutHint;
        } else {
          layoutEl.style.display = "none";
        }

        if (!option.title && !option.description) {
          document.getElementById("directionBlock").classList.add("empty");
        }
      }

      loadShare();
    </script>
  </body>
</html>
