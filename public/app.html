<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>织境 / 工作台</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23faf9f4'/%3E%3Ccircle cx='21' cy='25' r='7' fill='%233d9a92'/%3E%3Ccircle cx='43' cy='20' r='7' fill='%23d9bc68'/%3E%3Ccircle cx='38' cy='43' r='7' fill='%23bd453c'/%3E%3Cpath d='M21 25 43 20 38 43 21 25' fill='none' stroke='%23202939' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
    <script>
      (function() {
        var t = localStorage.getItem("thoughtgrid-theme") || localStorage.getItem("oryzae-theme");
        if (t === "dark" || t === "light") {
          document.documentElement.setAttribute("data-theme", t);
        }
        var l = localStorage.getItem("thoughtgrid-lang") || localStorage.getItem("oryzae-lang");
        if (l === "zh" || l === "en") {
          document.documentElement.setAttribute("lang", l === "zh" ? "zh-CN" : "en");
        }
      })();
    </script>
    <link rel="stylesheet" href="/styles.css?v=25" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sideNav" class="rail" aria-label="主导航">
        <button id="navToggle" class="nav-toggle" type="button" aria-label="折叠导航" aria-expanded="true">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-brand">
          <strong>织境平台</strong>
        </div>
        <nav class="nav-links" aria-label="页面导航">
          <a class="nav-link" href="/" title="主页">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
            <span class="nav-label">主页</span>
          </a>
          <a class="nav-link active" href="/app.html" title="工作台">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg></span>
            <span class="nav-label">工作台</span>
          </a>
          <a class="nav-link" href="/history/?view=library" title="素材库">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 14l1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/></svg></span>
            <span class="nav-label">素材库</span>
          </a>
          <a class="nav-link" href="/history/" title="历史记录">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></span>
            <span class="nav-label">历史记录</span>
          </a>
          <a class="nav-link" href="/history/?view=guide" title="使用介绍">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg></span>
            <span class="nav-label">使用介绍</span>
          </a>
          <a class="nav-link" href="/history/?view=settings" title="设置">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M20 12h-2a4 4 0 0 0-.3-1.7l1.4-1.4a8 8 0 0 0-1.4-1.4l-1.4 1.4A4 4 0 0 0 14 8.3V6h-4v2.3a4 4 0 0 0-1.7.3l-1.4-1.4a8 8 0 0 0-1.4 1.4l1.4 1.4A4 4 0 0 0 6.3 10H4v4h2.3a4 4 0 0 0 .3 1.7l-1.4 1.4a8 8 0 0 0 1.4 1.4l1.4-1.4a4 4 0 0 0 1.7.3V20h4v-2.3a4 4 0 0 0 1.7-.3l1.4 1.4a8 8 0 0 0 1.4-1.4l-1.4-1.4a4 4 0 0 0 .3-1.7H20z"/></svg></span>
            <span class="nav-label">设置</span>
          </a>
        </nav>
      </aside>

      <main id="viewport" class="viewport">
        <div id="board" class="board">
          <div id="groupLayer" class="group-layer" aria-hidden="true"></div>
          <svg id="linkLayer" class="link-layer" viewBox="0 0 2400 1500" aria-hidden="true"></svg>

          <section id="sourceNode" class="node source-node" data-node-id="source" style="left: 96px; top: 88px;">
            <div class="source-tabs">
              <button type="button" class="source-tab active" data-tab="file">文件</button>
              <button type="button" class="source-tab" data-tab="url">链接</button>
              <button type="button" class="source-tab" data-tab="text">文字</button>
            </div>
            <label class="upload-target" for="fileInput">
              <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp,image/gif,video/mp4,video/webm,video/quicktime,.mp4,.webm,.mov,.m4v,.txt,.md,.json,.doc,.docx,.pdf,.ppt,.pptx" />
              <span id="emptyState" class="empty-state">
                <strong>上传图片、视频或文档</strong>
                <span>选择图片、视频、Word、PDF、PPT 或 TXT，生成分支方向</span>
              </span>
              <img id="sourcePreview" class="source-preview" alt="上传的源图" />
            </label>
            <div class="url-input-panel hidden">
              <input id="urlInput" type="url" placeholder="https://..." autocomplete="off" />
              <button id="urlAnalyzeButton" class="primary-button" disabled>分析链接</button>
            </div>
            <div class="source-text-panel hidden">
              <textarea id="sourceTextInput" class="source-text-input" placeholder="输入文字内容"></textarea>
            </div>
            <div class="node-caption">
              <span id="sourceName">源卡片</span>
              <div class="research-dropdown-wrapper">
                <button id="researchButton" class="research-button" type="button" disabled>研究</button>
                <div class="research-dropdown">
                  <div class="research-option" data-mode="analyze">
                    <span class="option-label">分析</span>
                    <div class="option-tooltip">调用 no-thinking 模式，快速视觉分析</div>
                  </div>
                  <div class="research-option" data-mode="explore">
                    <span class="option-label">探索</span>
                    <div class="option-tooltip">调用 thinking 模式，深入分析并搜集相关资料</div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section id="analysisNode" class="node analysis-node hidden" data-node-id="analysis" style="left: 452px; top: 96px;">
            <p class="eyebrow">MODEL READ</p>
            <h2>图像理解</h2>
            <p id="analysisSummary"></p>
            <div id="keywordList" class="keyword-list"></div>
          </section>
        </div>
        <div id="marqueeSelection" class="marquee-selection hidden" aria-hidden="true"></div>
        <div id="canvasTitleBar" class="canvas-title-bar" aria-label="当前画布">
          <div class="canvas-title-box" title="双击修改画布名字">
            <span id="canvasTitleDisplay" class="canvas-title-display">未命名会话</span>
            <input id="canvasTitleInput" class="canvas-title-input hidden" type="text" maxlength="80" autocomplete="off" aria-label="画布名字" />
          </div>
          <button id="canvasNewButton" class="canvas-title-new-button" type="button" aria-label="新建画布" title="新建画布">+</button>
        </div>
        <div id="selectionToolbar" class="selection-toolbar hidden" aria-label="画布选择工具">
          <span id="selectionCount">0</span>
          <button id="groupSelectionButton" type="button">分组</button>
          <button id="ungroupSelectionButton" type="button">解除</button>
          <button id="arrangeSelectionButton" type="button">整理</button>
        </div>
        <div id="canvasHistoryNav" class="canvas-history-nav" aria-label="历史画布切换">
          <div class="canvas-history-label">切换画布</div>
          <div class="canvas-history-buttons">
            <button id="canvasPrevButton" class="canvas-history-button" type="button" aria-label="上一张画布" title="上一张画布">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 6 9 12l6 6"/>
              </svg>
            </button>
            <button id="canvasNextButton" class="canvas-history-button" type="button" aria-label="下一张画布" title="下一张画布">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 6 6 6-6 6"/>
              </svg>
            </button>
          </div>
          <div class="canvas-quick-actions" aria-label="常用画布操作">
            <button id="quickNewCardButton" class="canvas-quick-button" type="button" aria-label="新建卡片" title="新建卡片">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="5" y="5" width="14" height="14" rx="3"/>
                <path d="M12 8v8M8 12h8"/>
              </svg>
            </button>
            <button id="quickArrangeButton" class="canvas-quick-button" type="button" aria-label="一键整理" title="一键整理">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="5" width="6" height="6" rx="2"/>
                <rect x="14" y="5" width="6" height="6" rx="2"/>
                <rect x="9" y="14" width="6" height="6" rx="2"/>
              </svg>
            </button>
            <button id="quickResetViewButton" class="canvas-quick-button" type="button" aria-label="重置视图" title="重置视图">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 4H4v4"/>
                <path d="M16 4h4v4"/>
                <path d="M20 16v4h-4"/>
                <path d="M4 16v4h4"/>
                <path d="M9 9h6v6H9z"/>
              </svg>
            </button>
          </div>
          <div class="canvas-zoom-hint">按 Ctrl 或 ⌘ + 滚轮可以缩放画布</div>
          <div class="canvas-link-hint">双击连线可以进行删除</div>
        </div>
        <aside id="minimap" class="minimap hidden" aria-label="画布缩略地图">
          <button id="minimapCloseButton" class="minimap-close" type="button" aria-label="关闭缩略图">×</button>
          <canvas id="minimapCanvas" width="180" height="112"></canvas>
          <div id="minimapViewport" class="minimap-viewport"></div>
        </aside>
      </main>

      <aside id="sessionPanel" class="session-panel hidden" aria-label="历史会话">
        <div class="session-panel-header">
          <span>历史会话</span>
          <button id="closeSessionPanel" class="icon-button" aria-label="关闭">×</button>
        </div>
        <div id="sessionList" class="session-list"></div>
      </aside>

      <footer class="statusbar" aria-label="对话侧栏">
        <form id="chatForm" class="chatbar">
          <div id="chatSidebarResize" class="chat-sidebar-resize" role="separator" aria-orientation="vertical" aria-label="调整对话区域宽度"></div>
          <div class="chat-panel-header">
            <span class="chat-panel-logo">ThoughtGrid</span>
            <div class="chat-panel-actions" aria-label="对话操作">
              <button id="chatAgentButton" class="chat-panel-button" type="button" aria-label="Agent" title="Agent">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 8V4"/>
                  <path d="M8 4h8"/>
                  <rect x="5" y="8" width="14" height="10" rx="2"/>
                  <path d="M9 13h.01M15 13h.01"/>
                  <path d="M9 21h6"/>
                  <path d="M12 18v3"/>
                </svg>
              </button>
              <button id="chatNewButton" class="chat-panel-button" type="button" aria-label="新建对话" title="新建对话">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14M5 12h14"/>
                </svg>
              </button>
              <button id="chatNewCanvasButton" class="chat-panel-button chat-new-canvas-button" type="button" aria-label="新建画布" title="新建画布">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="4" y="4" width="16" height="16" rx="2"/>
                  <path d="M8 8h8M8 12h5"/>
                  <path d="M16 15v4M14 17h4"/>
                </svg>
              </button>
              <button id="chatHistoryButton" class="chat-panel-button" type="button" aria-label="历史对话" title="历史对话">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 12a9 9 0 1 0 3-6.7"/>
                  <path d="M3 4v5h5"/>
                  <path d="M12 7v5l3 2"/>
                </svg>
              </button>
              <span class="chat-panel-divider" aria-hidden="true"></span>
              <button id="chatCloseButton" class="chat-panel-button" type="button" aria-label="关闭对话区域" title="关闭对话区域">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M6 6l12 12M18 6 6 18"/>
                </svg>
              </button>
            </div>
          </div>
          <div id="chatConversationPanel" class="chat-conversation-panel hidden" aria-label="历史对话列表">
            <div id="chatConversationList" class="chat-conversation-list"></div>
          </div>
          <div id="agentPanel" class="agent-panel hidden" aria-label="Subagents 控制面板">
            <div class="agent-panel-header">
              <strong>Agent</strong>
              <button id="closeAgentPanel" class="agent-panel-close" type="button" aria-label="关闭 Agent 面板">×</button>
            </div>
            <label class="agent-subagents-toggle">
              <input id="subagentsToggle" type="checkbox" />
              <span>允许模型自动创建 subagents</span>
            </label>
            <p class="agent-panel-note">开启后，AI 会在复杂任务中自行判断是否创建 subagents；用户不能手动创建。</p>
          </div>
          <div class="chat-context-indicator hidden"></div>
          <div class="chat-messages-wrap">
            <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
            <button id="chatScrollBottom" class="chat-scroll-bottom hidden" type="button" aria-label="回到底部" title="回到底部">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14"/>
                <path d="m6 13 6 6 6-6"/>
              </svg>
            </button>
          </div>
          <div class="chat-compose">
            <div id="commandMenu" class="command-menu hidden" role="listbox" aria-label="工作台命令"></div>
            <div id="cardSearchBar" class="card-search-bar hidden">
              <div class="card-search-input-wrap">
                <input id="cardSearchInput" class="card-search-input" type="text" placeholder="搜索画布卡片..." autocomplete="off" />
                <button id="cardSearchCloseButton" class="card-search-close" type="button" aria-label="关闭搜索" title="关闭搜索">×</button>
              </div>
              <div id="cardSearchResults" class="card-search-results"></div>
            </div>
            <div id="chatAttachmentPreview" class="chat-attachment-preview hidden"></div>
            <div class="chat-agent-card">
              <div class="chat-input-row">
                <div id="chatInputResize" class="chat-input-resize" role="separator" aria-orientation="horizontal" aria-label="调整输入框高度"></div>
                <textarea id="chatInput" class="chat-input" rows="3" autocomplete="off" placeholder="输入方向、约束，或 / 命令"></textarea>
                <div class="chat-input-actions">
                  <div class="chat-action-wrapper">
                    <button id="chatAttachButton" class="chat-attach-button" type="button" title="打开功能区" aria-label="打开功能区" aria-expanded="false">+</button>
                    <div id="chatActionMenu" class="chat-action-menu hidden" role="menu" aria-label="功能区">
                      <button id="chatUploadAction" class="chat-action-item" type="button" role="menuitem">
                        <span class="chat-action-icon">+</span>
                        <span class="chat-action-copy">
                          <span class="chat-action-title">上传图片或文件</span>
                          <span class="chat-action-desc">添加到当前画布或输入框</span>
                        </span>
                      </button>
                      <button id="chatMaterialAction" class="chat-action-item" type="button" role="menuitem">
                        <span class="chat-action-icon">L</span>
                        <span class="chat-action-copy">
                          <span class="chat-action-title">素材导入</span>
                          <span class="chat-action-desc">从素材库搜索并加入对话或画布</span>
                        </span>
                      </button>
                      <button id="chatMinimapAction" class="chat-action-item" type="button" role="menuitem">
                        <span class="chat-action-icon">M</span>
                        <span class="chat-action-copy">
                          <span class="chat-action-title">缩略图</span>
                          <span class="chat-action-desc">打开或关闭画布缩略图</span>
                        </span>
                      </button>
                      <button id="chatDeepThinkAction" class="chat-action-item" type="button" role="menuitem">
                        <span class="chat-action-icon">D</span>
                        <span class="chat-action-copy">
                          <span class="chat-action-title">深入研究</span>
                          <span class="chat-action-desc">把研究过程展开成画布卡片</span>
                        </span>
                      </button>
                      <button id="chatSubagentsAction" class="chat-action-item" type="button" role="menuitem">
                        <span class="chat-action-icon">A</span>
                        <span class="chat-action-copy">
                          <span class="chat-action-title">Subagents</span>
                          <span class="chat-action-desc">允许复杂任务拆成多个快速 agent</span>
                        </span>
                      </button>
                      <button id="chatNewCardAction" class="chat-action-item" type="button" role="menuitem">
                        <span class="chat-action-icon">N</span>
                        <span class="chat-action-copy">
                          <span class="chat-action-title">新建卡片</span>
                          <span class="chat-action-desc">在画布上创建空白卡片</span>
                        </span>
                      </button>
                    </div>
                  </div>
                  <div id="deepThinkModeChip" class="deep-think-mode-chip hidden" aria-label="深入研究模式">
                    <button id="deepThinkModeCancel" class="deep-think-cancel" type="button" aria-label="取消深入研究模式">×</button>
                    <span class="deep-think-chip-icon" aria-hidden="true">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 15l8-4 8 4"/>
                        <path d="M12 11v9"/>
                        <path d="M9 20h6"/>
                        <path d="M14.5 9.5 18 6"/>
                        <path d="M5 12l3-3"/>
                        <circle cx="19" cy="5" r="2"/>
                      </svg>
                    </span>
                    <span class="deep-think-chip-label">深入研究</span>
                  </div>
                  <div class="chat-input-spacer"></div>
                  <div class="thinking-toggle-wrapper">
                    <button id="thinkingToggle" class="thinking-toggle" type="button">
                      <span class="thinking-label">思考</span>
                      <span class="thinking-arrow">⌃</span>
                    </button>
                    <div class="thinking-dropdown">
                      <button class="thinking-option" data-mode="thinking">思考</button>
                      <button class="thinking-option" data-mode="no-thinking">快速</button>
                    </div>
                  </div>
                  <div class="chat-voice-actions" aria-label="Voice controls">
                    <button id="chatAsrButton" class="chat-asr-button" type="button" title="语音转文字" aria-label="语音转文字">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"/>
                        <path d="M5 11a7 7 0 0 0 14 0"/>
                        <path d="M12 18v3"/>
                        <path d="M8 21h8"/>
                      </svg>
                    </button>
                    <button id="chatRealtimeButton" class="chat-realtime-button" type="button" title="实时语音控制" aria-label="实时语音控制">
                      <svg class="chat-primary-voice-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 10v4"/>
                        <path d="M9 7v10"/>
                        <path d="M13 5v14"/>
                        <path d="M17 8v8"/>
                        <path d="M21 11v2"/>
                      </svg>
                      <svg class="chat-primary-send-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 19V5"/>
                        <path d="m5 12 7-7 7 7"/>
                      </svg>
                    </button>
                  </div>
                  <div id="chatAsrReview" class="chat-asr-review hidden" aria-label="确认转写">
                    <button id="chatAsrRejectButton" class="chat-review-button" type="button" title="删除转写" aria-label="删除转写">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M18 6 6 18"/>
                        <path d="m6 6 12 12"/>
                      </svg>
                    </button>
                    <button id="chatAsrAcceptButton" class="chat-review-button" type="button" title="保留转写" aria-label="保留转写">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m20 6-11 11-5-5"/>
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </form>
      </footer>
      <button id="chatSidebarToggle" class="chat-sidebar-toggle hidden" type="button" aria-label="打开对话区域" title="打开对话区域" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 5.5A3.5 3.5 0 0 1 7.5 2h9A3.5 3.5 0 0 1 20 5.5v7A3.5 3.5 0 0 1 16.5 16H10l-5 4v-4.5A3.5 3.5 0 0 1 4 12.5Z"/>
          <path d="M8 8h8M8 12h5"/>
        </svg>
      </button>
    </div>

    <template id="optionTemplate">
      <section class="node option-node" data-node-id="" data-task-type="general" data-node-type="image">
        <span class="card-badge badge-general"></span>
        <p class="eyebrow option-tone"></p>
        <h3 class="option-title"></h3>
        <p class="option-description"></p>
        <div class="option-rich-content" hidden></div>
        <div class="option-action-row">
          <button class="generate-button">生成这张图</button>
        </div>
      </section>
    </template>

    <aside id="settingsPanel" class="settings-panel hidden" aria-label="API 设置">
      <div class="settings-panel-header">
        <span>API 设置</span>
        <button id="closeSettingsPanel" class="icon-button" aria-label="关闭">×</button>
      </div>
      <div class="settings-tabs">
        <button type="button" class="settings-tab active" data-role="analysis">分析</button>
        <button type="button" class="settings-tab" data-role="chat">对话</button>
        <button type="button" class="settings-tab" data-role="image">成图</button>
        <button type="button" class="settings-tab" data-role="asr">ASR</button>
        <button type="button" class="settings-tab" data-role="realtime">实时语音</button>
        <button type="button" class="settings-tab" data-role="deepthink">深入研究</button>
      </div>
      <form id="settingsForm" class="settings-form" autocomplete="off">
          <label>
            <span>API Endpoint</span>
          <input id="settingsEndpoint" type="url" placeholder="https://api.example.com/v1 或 wss://..." required />
          </label>
        <label>
          <span>Model</span>
          <input id="settingsModel" type="text" placeholder="model-name" required />
        </label>
        <label>
          <span>API Key</span>
          <input id="settingsApiKey" type="password" placeholder="sk-..." />
        </label>
        <label>
          <span>Temperature</span>
          <input id="settingsTemperature" type="number" min="0" max="2" step="0.1" value="0.7" required />
        </label>
        <div id="settingsAdvancedFields" class="settings-advanced-fields" aria-live="polite"></div>
        <div class="settings-actions">
          <button type="submit" class="primary-button">保存</button>
          <button type="button" id="settingsResetBtn" class="secondary-button">重置</button>
        </div>
      </form>
    </aside>

    <aside id="imageViewerModal" class="image-viewer-modal hidden" aria-label="图片查看器" role="dialog" aria-modal="true">
      <div class="image-viewer-backdrop" data-close-modal></div>
      <button id="closeImageViewer" class="image-viewer-close" aria-label="关闭">×</button>
      <div id="viewerThumbnailStrip" class="viewer-thumbnail-strip"></div>
      <div class="image-viewer-content">
        <img id="viewerImage" class="viewer-image" src="" alt="" />
        <canvas id="viewerMaskCanvas" class="viewer-mask-canvas" aria-label="图片选区画布"></canvas>
        <div class="viewer-meta">
          <h3 id="viewerTitle"></h3>
          <p id="viewerExplanation"></p>
          <div class="viewer-actions">
            <button id="viewerBrushTool" class="viewer-tool-button" type="button" aria-pressed="false" title="选择">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 20c2.8-.3 4.7-1.1 5.8-2.4"/>
                <path d="M8.7 17.7 4.3 13.3"/>
                <path d="m9 18 10.2-10.2a2.7 2.7 0 0 0-3.8-3.8L5.2 14.2"/>
                <path d="M14.6 5.4 18.6 9.4"/>
              </svg>
              <span>选择</span>
            </button>
            <button id="viewerClearMask" class="viewer-tool-button hidden" type="button" title="清除选区">清除</button>
            <div class="viewer-aspect-control">
              <button id="viewerAspectButton" class="viewer-tool-button" type="button" aria-expanded="false" title="宽高比">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="4" y="6" width="16" height="12" rx="2"/>
                  <path d="M9 6v12"/>
                  <path d="M4 11h16"/>
                </svg>
                <span id="viewerAspectLabel">宽高比</span>
                <span class="viewer-aspect-caret">⌄</span>
              </button>
              <div id="viewerAspectMenu" class="viewer-aspect-menu hidden">
                <div class="viewer-aspect-title">用不同宽高比生成此图片</div>
                <button type="button" data-aspect="auto"><span></span>原图比例</button>
                <button type="button" data-aspect="1:1"><span></span>方形 <em>1:1</em></button>
                <button type="button" data-aspect="3:4"><span></span>竖版 <em>3:4</em></button>
                <button type="button" data-aspect="9:16"><span></span>故事版 <em>9:16</em></button>
                <button type="button" data-aspect="4:3"><span></span>横版 <em>4:3</em></button>
                <button type="button" data-aspect="16:9"><span></span>宽屏 <em>16:9</em></button>
              </div>
            </div>
            <button id="viewerRegenerate" class="primary-button">重生成</button>
            <button id="viewerModify" class="secondary-button">修改</button>
            <button id="viewerDownload" class="secondary-button">下载</button>
            <button id="imageShareButton" class="share-button" type="button" title="分享">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="18" cy="5" r="3"/>
                <circle cx="6" cy="12" r="3"/>
                <circle cx="18" cy="19" r="3"/>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
              </svg>
            </button>
          </div>
          <div id="viewerModifyPanel" class="viewer-modify-panel hidden">
            <textarea id="viewerPromptInput" rows="1" placeholder="描述编辑"></textarea>
            <div class="viewer-modify-actions">
              <button id="viewerAsrButton" class="viewer-asr-button" type="button" title="语音转文字" aria-label="语音转文字">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"/>
                  <path d="M5 11a7 7 0 0 0 14 0"/>
                  <path d="M12 18v3"/>
                  <path d="M8 21h8"/>
                </svg>
              </button>
              <button id="viewerSubmitModify" class="primary-button">确认修改</button>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <aside id="imageShareModal" class="image-share-modal hidden" aria-label="分享图片" role="dialog" aria-modal="true">
      <div class="image-share-backdrop" data-close-share></div>
      <div class="image-share-content">
        <button id="closeImageShare" class="image-share-close" type="button" aria-label="关闭">×</button>
        <h3 id="shareTitle">分享图片</h3>
        <img id="sharePreviewImage" class="share-preview-image" src="" alt="" />
        <label class="share-name-field">
          <span>图片命名</span>
          <input id="shareNameInput" type="text" autocomplete="off" />
        </label>
        <input id="shareLinkInput" class="share-link-input" type="text" readonly placeholder="点击复制链接生成分享地址" />
        <div class="share-modal-actions">
          <button id="shareCopyButton" class="share-round-action" type="button">
            <span aria-hidden="true">↗</span>
            <strong>复制链接</strong>
          </button>
          <button id="shareRenameButton" class="share-round-action" type="button">
            <span aria-hidden="true">T</span>
            <strong>重命名</strong>
          </button>
          <button id="shareDownloadButton" class="share-round-action" type="button">
            <span aria-hidden="true">↓</span>
            <strong>下载</strong>
          </button>
        </div>
      </div>
    </aside>

    <div id="referenceModal" class="modal reference-modal" role="dialog" aria-modal="true" style="display:none;">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <button class="modal-close" aria-label="Close">&times;</button>
        <h3 class="reference-modal-title">参考资料</h3>
        <div class="reference-list"></div>
      </div>
    </div>

    <div id="blueprintModal" class="modal blueprint-modal" role="dialog" aria-modal="true" style="display:none;">
      <div class="modal-backdrop" data-close-blueprint></div>
      <div class="modal-content">
        <button class="modal-close" aria-label="Close" data-close-blueprint>&times;</button>
        <h3 class="blueprint-modal-title">蓝图</h3>
        <div class="blueprint-canvas">
          <svg class="blueprint-svg"></svg>
        </div>
        <form id="blueprintCompose" class="blueprint-compose" autocomplete="off">
          <textarea id="blueprintPromptInput" rows="1" placeholder="描述想生成的图片，或补充蓝图整体关系..."></textarea>
          <button id="blueprintPromptSend" type="submit" aria-label="发送蓝图成图">发送</button>
        </form>
      </div>
    </div>

    <div id="selectionToast" class="selection-toast" role="status" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <script type="module" src="/app.js?v=23"></script>
  </body>
</html>
